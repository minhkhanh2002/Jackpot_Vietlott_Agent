name: Update Vietlott Data

on:
  schedule:
    # 12:00 UTC = 19:00 giờ VN, sau khung giờ quay số 18:00-18:30 mọi ngày trong tuần
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/update_data.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
