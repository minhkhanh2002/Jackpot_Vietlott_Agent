# Cơ cấu giải thưởng chính thức Power 6/55, tham chiếu vietlott.vn/vi/trung-thuong/ket-qua-trung-thuong/655.html
# jackpot amount KHÔNG cố định — luôn lấy từ vietlott_results.jackpot1_value / jackpot2_value của kỳ quay
# tương ứng; hai dòng "Jackpot" ở đây chỉ đánh dấu tier nào là jackpot (amount: null).
ticket_price: 10000  # VNĐ / vé, xác nhận lại khi triển khai Phase 2 (Optimizer/Gym Env)

# Power 6/55 có 7 số: 6 số chính + 1 "số Power" riêng (đánh dấu class "active" trên trang kết quả).
# Jackpot 2 yêu cầu trùng 5/6 số chính + đúng số Power — logic match chính xác cài trong
# prize_calculator.py, ở đây chỉ khai báo amount cố định theo hạng.
tiers:
  - name: "Jackpot 1"
    match: 6
    amount: null   # lấy từ jackpot1_value
  - name: "Jackpot 2"
    match: "5+bonus"
    amount: null   # lấy từ jackpot2_value
  - name: "Giải Nhất"
    match: 5
    amount: 40000000
  - name: "Giải Nhì"
    match: 4
    amount: 500000
  - name: "Giải Ba"
    match: 3
    amount: 50000
